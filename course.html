<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windows CLI — Уроки</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root { --bg: #0f1419; --panel: #1a2332; --border: #2d3a4f; --text: #e8eef4; --muted: #8b9cb3; --win-blue: #0078d4; --cyan: #4fc3f7; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: "Segoe UI", Inter, system-ui, sans-serif; }
    .wrap { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
    @media (max-width: 820px) { .wrap { grid-template-columns: 1fr; } aside { border-right: none !important; border-bottom: 1px solid var(--border); } }
    aside { background: var(--panel); border-right: 1px solid var(--border); padding: 16px; overflow-y: auto; }
    main { padding: 24px 32px; overflow-y: auto; max-width: 860px; }
    .top-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .top-nav a { color: var(--muted); text-decoration: none; font-size: 0.85rem; padding: 5px 10px; border-radius: 6px; }
    .top-nav a:hover { color: var(--text); background: #243044; }
    .top-nav a.active { color: var(--win-blue); }
    h1.side { font-size: 1rem; margin: 0 0 12px; color: var(--win-blue); }
    .lesson-link { display: block; padding: 6px 10px; border-radius: 8px; color: var(--text); text-decoration: none; font-size: 0.81rem; margin-bottom: 2px; border: 1px solid transparent; }
    .lesson-link:hover { background: #243044; }
    .lesson-link.active { border-color: var(--win-blue); color: var(--win-blue); background: rgba(0,120,212,0.08); }
    #content { line-height: 1.65; font-size: 0.94rem; }
    #content h1 { font-size: 1.45rem; margin-top: 0; }
    #content h2 { font-size: 1.1rem; color: var(--cyan); margin-top: 1.4em; }
    #content code { background: #243044; padding: 2px 6px; border-radius: 4px; font-size: 0.88em; }
    #content pre { background: #121a24; border: 1px solid var(--border); border-radius: 8px; padding: 14px; overflow-x: auto; }
    #content pre code { background: none; padding: 0; }
    #content table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: 0.86rem; }
    #content th, #content td { border: 1px solid var(--border); padding: 8px; text-align: left; }
    #content th { background: #243044; }
    #loading { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <aside>
      <nav class="top-nav">
        <a href="index.html">Тренажер</a>
        <a href="course.html" class="active">Уроки</a>
        <a href="cheatsheet.html">Шпаргалка</a>
      </nav>
      <h1 class="side">13 уроків Windows CLI</h1>
      <a class="lesson-link active" href="#" data-file="windows-cli-course/README.md">Огляд</a>
      <a class="lesson-link" href="#" data-file="windows-cli-course/01-windows-terminal-basics.md">1. Windows Terminal</a>
      <a class="lesson-link" href="#" data-file="windows-cli-course/02-powershell-basics.md">2. PowerShell</a>
      <a class="lesson-link" href="#" data-file="windows-cli-course/03-cmd-basics.md">3. CMD</a>
      <a class="lesson-link" href="#" data-file="windows-cli-course/04-files-and-folders.md">4. Файли</a>
      <a class="lesson-link" href="#" data-file="windows-cli-course/05-search-and-text.md">5. Пошук</a>
      <a class="lesson-link" href="#" data-file="windows-cli-course/06-network-diagnostics.md">6. Мережа</a>
      <a class="lesson-link" href="#" data-file="windows-cli-course/07-ssh-and-remote-access.md">7. SSH</a>
      <a class="lesson-link" href="#" data-file="windows-cli-course/08-git-and-github.md">8. Git</a>
      <a class="lesson-link" href="#" data-file="windows-cli-course/09-python-node-and-package-managers.md">9. Python/Node/winget</a>
      <a class="lesson-link" href="#" data-file="windows-cli-course/10-processes-services-and-ports.md">10. Процеси</a>
      <a class="lesson-link" href="#" data-file="windows-cli-course/11-wsl-linux-on-windows.md">11. WSL</a>
      <a class="lesson-link" href="#" data-file="windows-cli-course/12-dangerous-commands.md">12. Небезпечні</a>
      <a class="lesson-link" href="#" data-file="windows-cli-course/13-daily-practice-plan.md">13. 14-денний план</a>
    </aside>
    <main>
      <div id="loading">Завантаження…</div>
      <article id="content"></article>
    </main>
  </div>
  <script>
    const links = document.querySelectorAll(".lesson-link");
    const content = document.getElementById("content");
    const loading = document.getElementById("loading");
    async function loadLesson(file) {
      loading.style.display = "block";
      content.innerHTML = "";
      try {
        const res = await fetch(file);
        if (!res.ok) throw new Error(res.statusText);
        content.innerHTML = marked.parse(await res.text());
        loading.style.display = "none";
        history.replaceState(null, "", `?lesson=${encodeURIComponent(file)}`);
      } catch (e) { loading.textContent = "Помилка: " + e.message; }
    }
    links.forEach(link => {
      link.addEventListener("click", e => {
        e.preventDefault();
        links.forEach(l => l.classList.remove("active"));
        link.classList.add("active");
        loadLesson(link.dataset.file);
      });
    });
    const initial = new URLSearchParams(location.search).get("lesson") || "windows-cli-course/README.md";
    const initLink = [...links].find(l => l.dataset.file === initial) || links[0];
    links.forEach(l => l.classList.toggle("active", l === initLink));
    loadLesson(initLink.dataset.file);
  </script>
</body>
</html>
