<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windows CLI — Шпаргалка</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root { --bg: #0f1419; --panel: #1a2332; --border: #2d3a4f; --text: #e8eef4; --muted: #8b9cb3; --win-blue: #0078d4; --cyan: #4fc3f7; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: "Segoe UI", Inter, system-ui, sans-serif; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 24px; }
    .top-nav { display: flex; gap: 10px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .top-nav a { color: var(--muted); text-decoration: none; font-size: 0.88rem; padding: 6px 12px; border-radius: 8px; }
    .top-nav a:hover { color: var(--text); background: #243044; }
    .top-nav a.active { color: var(--win-blue); }
    #content h2 { color: var(--cyan); font-size: 1.1rem; margin-top: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    #content code { background: #243044; padding: 2px 6px; border-radius: 4px; font-family: Consolas, monospace; }
    #content pre { background: #121a24; border: 1px solid var(--border); border-radius: 8px; padding: 12px; overflow-x: auto; }
    #content pre code { background: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="top-nav">
      <a href="index.html">Тренажер</a>
      <a href="course.html">Уроки</a>
      <a href="cheatsheet.html" class="active">Шпаргалка</a>
    </nav>
    <article id="content">Завантаження…</article>
  </div>
  <script>
    fetch("windows-cli-course/cheatsheet.md")
      .then(r => r.text())
      .then(md => { document.getElementById("content").innerHTML = marked.parse(md); });
  </script>
</body>
</html>
